<!DOCTYPE html>
<html>
<head>
  <title>SplitSmart AI Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    .dark {
      background: #121212;
    }

    .container {
      width: 400px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-top: 30px;
      backdrop-filter: blur(10px);
    }

    input, select {
      width: 80%;
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #00c6ff;
      color: white;
    }

    li {
      list-style: none;
      margin: 8px 0;
      background: rgba(255,255,255,0.2);
      padding: 8px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="authPage">
  <h2>🔐 Login</h2>
  <input id="username" placeholder="Enter username"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container hidden" id="appPage">
  <h2>💸 SplitSmart AI Pro</h2>

  <button onclick="logout()">Logout</button>
  <button onclick="toggleDark()">🌙 Toggle Mode</button>

  <h4>Add Person</h4>
  <input id="personName" placeholder="Enter name">
  <button onclick="addPerson()">Add</button>

  <h4>Add Expense</h4>
  <select id="personSelect"></select><br>
  <input id="amount" placeholder="Amount"><br>
  <button onclick="addExpense()">Add Expense</button>

  <ul id="expenseList"></ul>

  <h3 id="total"></h3>

  <button onclick="calculate()">Calculate Split</button>

  <div id="result"></div>

  <canvas id="chart" width="300" height="200"></canvas>
</div>

<script>
let currentUser = localStorage.getItem("user");

function login() {
  let username = document.getElementById("username").value;
  if (!username) return;
  localStorage.setItem("user", username);
  location.reload();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

if (currentUser) {
  document.getElementById("authPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

let people = JSON.parse(localStorage.getItem("people")) || [];
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function saveData() {
  localStorage.setItem("people", JSON.stringify(people));
  localStorage.setItem("expenses", JSON.stringify(expenses));
}

function renderPeople() {
  let select = document.getElementById("personSelect");
  select.innerHTML = "";
  people.forEach(p => {
    let option = document.createElement("option");
    option.value = p;
    option.textContent = p;
    select.appendChild(option);
  });
}

function renderExpenses() {
  let list = document.getElementById("expenseList");
  list.innerHTML = "";

  expenses.forEach((e, i) => {
    let li = document.createElement("li");
    li.innerHTML = `${e.name}: ₹${e.amount}
      <button onclick="deleteExpense(${i})">❌</button>`;
    list.appendChild(li);
  });

  let total = expenses.reduce((s,e)=>s+e.amount,0);
  document.getElementById("total").innerText = "Total: ₹" + total;

  renderChart();
}

function addPerson() {
  let name = document.getElementById("personName").value;
  if (!name) return;
  people.push(name);
  document.getElementById("personName").value = "";
  saveData();
  renderPeople();
}

function addExpense() {
  let name = document.getElementById("personSelect").value;
  let amount = parseFloat(document.getElementById("amount").value);
  if (!name || !amount) return;

  expenses.push({ name, amount });
  document.getElementById("amount").value = "";
  saveData();
  renderExpenses();
}

function deleteExpense(i) {
  expenses.splice(i,1);
  saveData();
  renderExpenses();
}

function calculate() {
  let total = expenses.reduce((s,e)=>s+e.amount,0);
  let perPerson = total / people.length;

  let balances = {};
  people.forEach(p=>balances[p] = -perPerson);
  expenses.forEach(e=>balances[e.name]+=e.amount);

  let result = "🤖 AI Suggestion:<br>";

  for (let p in balances) {
    if (balances[p] > 0) {
      result += `${p} gets ₹${balances[p].toFixed(2)}<br>`;
    } else {
      result += `${p} pays ₹${Math.abs(balances[p]).toFixed(2)}<br>`;
    }
  }

  document.getElementById("result").innerHTML = result;
}

let chart;

function renderChart() {
  let ctx = document.getElementById("chart");

  let dataMap = {};
  expenses.forEach(e=>{
    dataMap[e.name] = (dataMap[e.name]||0)+e.amount;
  });

  let labels = Object.keys(dataMap);
  let data = Object.values(dataMap);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: data
      }]
    }
  });
}

renderPeople();
renderExpenses();
</script>

</body>
</html>
